<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian 讲义生成器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>Obsidian 讲义生成器</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="open-generate-modal">
                    <i class="fas fa-download"></i> 生成讲义
                </button>
                <button class="btn btn-secondary" id="select-path-btn">
                    <i class="fas fa-folder-open"></i> 选择仓库路径
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧面板：文件选择 -->
            <div class="panel file-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-folder-tree"></i> Obsidian 文件树</h2>
                    <div class="actions">
                        <button class="btn btn-secondary btn-small" id="refresh-btn" title="刷新">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button class="btn btn-secondary btn-small" id="collapse-all-btn" title="折叠全部">
                            <i class="fas fa-compress-alt"></i>
                        </button>
                        <button class="btn btn-secondary btn-small" id="expand-all-btn" title="展开全部">
                            <i class="fas fa-expand-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="search-input" class="search-input" placeholder="搜索文件名或内容...">
                    <select id="search-type" class="search-type">
                        <option value="filename">文件名</option>
                        <option value="content">内容</option>
                    </select>
                    <button class="btn btn-primary btn-small" id="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <!-- 文件树容器 -->
                <div class="file-tree-container">
                    <div id="file-tree" class="file-tree">
                        <div class="loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>正在加载目录结构...</p>
                        </div>
                    </div>
                </div>

                <!-- 状态信息 -->
                <div class="status-bar">
                    <span id="status" class="status">就绪</span>
                    <span id="file-count" class="file-count">文件总数：0</span>
                </div>
            </div>

            <!-- 中间面板：已选择文件 -->
            <div class="panel selected-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-clipboard-list"></i> 已选择文件</h2>
                    <div class="actions">
                        <button class="btn btn-secondary btn-small" id="sort-selected" title="排序">
                            <i class="fas fa-sort-alpha-down"></i>
                        </button>
                        <button class="btn btn-danger btn-small" id="clear-selected" title="清空">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="selected-info">
                    <span>已选择 <strong id="selected-count">0</strong> 个文件</span>
                    <span>格式：<strong id="format-pill">HTML</strong></span>
                </div>

                <div id="selected-list" class="selected-list">
                    <p class="empty-message">暂无选择的文件</p>
                </div>

            </div>

            <!-- 右侧面板：预览 -->
            <div class="panel preview-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-eye"></i> 讲义预览</h2>
                    <div class="actions">
                        <button class="btn btn-secondary btn-small" id="copy-preview">
                            <i class="fas fa-copy"></i> 复制
                        </button>
                        <button class="btn btn-secondary btn-small" id="clear-preview">
                            <i class="fas fa-trash"></i> 清空
                        </button>
                    </div>
                </div>

                <!-- 预览内容 -->
                <div id="preview-content" class="preview-content">
                    <div class="empty-preview">
                        <i class="fas fa-file-alt" style="font-size: 3rem; margin-bottom: 20px; color: #cbd5e0;"></i>
                        <p style="color: #718096;">预览将显示在这里</p>
                        <p class="small-text" style="color: #a0aec0;">从左侧选择文件后自动预览</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <p>Obsidian 讲义生成器 v1.0 | 
               <span>当前路径：<strong id="current-path">未设置</strong></span>
            </p>
        </footer>
    </div>

    <!-- 路径选择模态框 -->
    <div id="path-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-folder-open"></i> 选择 Obsidian 仓库路径</h3>
                <button class="modal-close" id="cancel-path-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="path-input">仓库路径</label>
                    <div class="input-group">
                        <input type="text" id="path-input" class="form-control" placeholder="请输入 Obsidian 仓库的完整路径">
                        <button class="btn btn-secondary" id="browse-path-btn">
                            <i class="fas fa-folder"></i> 浏览
                        </button>
                    </div>
                    <div id="path-validation" class="validation-message"></div>
                </div>
                <div class="tips">
                    <h4><i class="fas fa-lightbulb"></i> 提示</h4>
                    <ul>
                        <li>路径必须是存在的文件夹</li>
                        <li>文件夹中应包含 Markdown 文件</li>
                        <li>确保有读取该路径的权限</li>
                    </ul>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-path-btn">取消</button>
                <button class="btn btn-primary" id="confirm-path-btn" disabled>确认</button>
            </div>
        </div>
    </div>

    <!-- 生成选项模态框 -->
    <div id="generate-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> 讲义生成选项</h3>
                <button class="modal-close" id="cancel-generate">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="modal-show-analysis" checked>
                        <span>包含【解析】内容</span>
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="modal-show-notes" checked>
                        <span>包含【注意】内容</span>
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="modal-include-toc" checked>
                        <span>生成目录</span>
                    </label>
                </div>
                <div class="form-group">
                    <label for="modal-format">输出格式</label>
                    <select id="modal-format" class="form-control">
                        <option value="html">HTML</option>
                        <option value="md">Markdown</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modal-filename">文件名（可选）</label>
                    <input type="text" id="modal-filename" class="form-control" placeholder="留空则自动生成">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-generate">取消</button>
                <button class="btn btn-primary" id="confirm-generate">生成</button>
            </div>
        </div>
    </div>

    <!-- 下载模态框 -->
    <div id="download-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> 讲义生成成功</h3>
                <button class="modal-close" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="success-info">
                    <p><strong>文件名：</strong><span id="download-filename"></span></p>
                    <p><strong>包含：</strong><span id="download-filecount"></span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="close-modal">关闭</button>
                <button class="btn btn-primary" id="download-btn">
                    <i class="fas fa-download"></i> 下载
                </button>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p id="loading-message">正在处理...</p>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="message-toast" class="toast"></div>

    <!-- 引入脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
