<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库讲义生成器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
        <symbol id="icon-book" viewBox="0 0 24 24">
            <rect x="3" y="4" width="8" height="16" rx="1"></rect>
            <rect x="13" y="4" width="8" height="16" rx="1"></rect>
        </symbol>
        <symbol id="icon-download" viewBox="0 0 24 24">
            <path d="M12 3v12"></path>
            <path d="M8 11l4 4 4-4"></path>
            <path d="M4 19h16"></path>
        </symbol>
        <symbol id="icon-folder" viewBox="0 0 24 24">
            <path d="M3 7h6l2 2h10v10H3z"></path>
        </symbol>
        <symbol id="icon-tree" viewBox="0 0 24 24">
            <circle cx="12" cy="6" r="2"></circle>
            <path d="M12 8v6"></path>
            <path d="M12 14l-4 4"></path>
            <path d="M12 14l4 4"></path>
        </symbol>
        <symbol id="icon-refresh" viewBox="0 0 24 24">
            <path d="M4 12a8 8 0 0 1 13.5-5.5"></path>
            <path d="M20 6v5h-5"></path>
            <path d="M20 12a8 8 0 0 1-13.5 5.5"></path>
            <path d="M4 18v-5h5"></path>
        </symbol>
        <symbol id="icon-compress" viewBox="0 0 24 24">
            <path d="M9 3v6H3"></path>
            <path d="M3 9l6-6"></path>
            <path d="M15 21v-6h6"></path>
            <path d="M21 15l-6 6"></path>
        </symbol>
        <symbol id="icon-expand" viewBox="0 0 24 24">
            <path d="M3 9V3h6"></path>
            <path d="M3 3l6 6"></path>
            <path d="M21 15v6h-6"></path>
            <path d="M21 21l-6-6"></path>
        </symbol>
        <symbol id="icon-search" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M16 16l5 5"></path>
        </symbol>
        <symbol id="icon-spinner" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" stroke-dasharray="42 14"></circle>
        </symbol>
        <symbol id="icon-clipboard" viewBox="0 0 24 24">
            <rect x="7" y="4" width="10" height="16" rx="2"></rect>
            <rect x="9" y="2" width="6" height="4" rx="1"></rect>
        </symbol>
        <symbol id="icon-sort" viewBox="0 0 24 24">
            <path d="M4 6h10"></path>
            <path d="M4 12h7"></path>
            <path d="M4 18h4"></path>
            <path d="M18 6v12"></path>
            <path d="M18 18l-3-3"></path>
            <path d="M18 18l3-3"></path>
        </symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24">
            <path d="M4 7h16"></path>
            <path d="M9 7V4h6v3"></path>
            <rect x="6" y="7" width="12" height="13" rx="2"></rect>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
        </symbol>
        <symbol id="icon-eye" viewBox="0 0 24 24">
            <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"></path>
            <circle cx="12" cy="12" r="2.5"></circle>
        </symbol>
        <symbol id="icon-copy" viewBox="0 0 24 24">
            <rect x="9" y="9" width="11" height="11" rx="2"></rect>
            <rect x="4" y="4" width="11" height="11" rx="2"></rect>
        </symbol>
        <symbol id="icon-file" viewBox="0 0 24 24">
            <path d="M6 3h8l4 4v14H6z"></path>
            <path d="M14 3v4h4"></path>
        </symbol>
        <symbol id="icon-lightbulb" viewBox="0 0 24 24">
            <path d="M8 10a4 4 0 1 1 8 0c0 2-1 3-2 4s-1 2-1 2h-2s0-1-1-2-2-2-2-4z"></path>
            <path d="M9 18h6"></path>
            <path d="M10 22h4"></path>
        </symbol>
        <symbol id="icon-cog" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
            <path d="M4.5 4.5l2 2"></path>
            <path d="M17.5 17.5l2 2"></path>
            <path d="M4.5 19.5l2-2"></path>
            <path d="M17.5 6.5l2-2"></path>
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M8 12l3 3 5-5"></path>
        </symbol>
        <symbol id="icon-close" viewBox="0 0 24 24">
            <path d="M6 6l12 12"></path>
            <path d="M18 6l-12 12"></path>
        </symbol>
        <symbol id="icon-caret-right" viewBox="0 0 24 24">
            <path d="M10 6l6 6-6 6z" fill="currentColor"></path>
        </symbol>
        <symbol id="icon-caret-down" viewBox="0 0 24 24">
            <path d="M6 10l6 6 6-6z" fill="currentColor"></path>
        </symbol>
    </svg>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="logo">
                <svg class="icon"><use href="#icon-book"></use></svg>
                <h1>知识库讲义生成器</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="open-generate-modal">
                    <svg class="icon"><use href="#icon-download"></use></svg> 生成讲义
                </button>
                <button class="btn btn-secondary" id="select-path-btn">
                    <svg class="icon"><use href="#icon-folder"></use></svg> 选择知识库路径
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧面板：文件选择 -->
            <div class="panel file-panel">
                <div class="panel-header">
                    <h2><svg class="icon"><use href="#icon-tree"></use></svg> 知识库文件树</h2>
                    <div class="actions">
                        <button class="btn btn-secondary btn-small" id="refresh-btn" title="刷新">
                            <svg class="icon"><use href="#icon-refresh"></use></svg>
                        </button>
                        <button class="btn btn-secondary btn-small" id="collapse-all-btn" title="折叠全部">
                            <svg class="icon"><use href="#icon-compress"></use></svg>
                        </button>
                        <button class="btn btn-secondary btn-small" id="expand-all-btn" title="展开全部">
                            <svg class="icon"><use href="#icon-expand"></use></svg>
                        </button>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="search-input" class="search-input" placeholder="搜索文件名或内容...">
                    <select id="search-type" class="search-type">
                        <option value="filename">文件名</option>
                        <option value="content">内容</option>
                    </select>
                    <button class="btn btn-primary btn-small" id="search-btn">
                        <svg class="icon"><use href="#icon-search"></use></svg>
                    </button>
                </div>

                <!-- 文件树容器 -->
                <div class="file-tree-container">
                    <div id="file-tree" class="file-tree">
                        <div class="loading">
                            <svg class="icon icon-spin"><use href="#icon-spinner"></use></svg>
                            <p>正在加载目录结构...</p>
                        </div>
                    </div>
                </div>

                <!-- 状态信息 -->
                <div class="status-bar">
                    <span id="status" class="status">就绪</span>
                    <span id="file-count" class="file-count">文件总数：0</span>
                </div>
            </div>

            <!-- 中间面板：已选择文件 -->
            <div class="panel selected-panel">
                <div class="panel-header">
                    <h2><svg class="icon"><use href="#icon-clipboard"></use></svg> 已选择文件</h2>
                    <div class="actions">
                        <button class="btn btn-secondary btn-small" id="sort-selected" title="排序">
                            <svg class="icon"><use href="#icon-sort"></use></svg>
                        </button>
                        <button class="btn btn-danger btn-small" id="clear-selected" title="清空">
                            <svg class="icon"><use href="#icon-trash"></use></svg>
                        </button>
                    </div>
                </div>

                <div class="selected-info">
                    <span>已选择 <strong id="selected-count">0</strong> 个文件</span>
                    <span>格式：<strong id="format-pill">HTML</strong></span>
                </div>

                <div id="selected-list" class="selected-list">
                    <p class="empty-message">暂无选择的文件</p>
                </div>

            </div>

            <!-- 右侧面板：预览 -->
            <div class="panel preview-panel">
                <div class="panel-header">
                    <h2><svg class="icon"><use href="#icon-eye"></use></svg> 讲义预览</h2>
                    <div class="actions">
                        <button class="btn btn-secondary btn-small" id="copy-preview">
                            <svg class="icon"><use href="#icon-copy"></use></svg> 复制
                        </button>
                        <button class="btn btn-secondary btn-small" id="clear-preview">
                            <svg class="icon"><use href="#icon-trash"></use></svg> 清空
                        </button>
                    </div>
                </div>

                <!-- 预览内容 -->
                <div id="preview-content" class="preview-content">
                    <div class="empty-preview">
                        <svg class="icon icon-lg icon-muted"><use href="#icon-file"></use></svg>
                        <p style="color: #718096;">预览将显示在这里</p>
                        <p class="small-text" style="color: #a0aec0;">从左侧选择文件后自动预览</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <p>知识库讲义生成器 v1.0 | 
               <span>当前路径：<strong id="current-path">未设置</strong></span>
            </p>
        </footer>
    </div>

    <!-- 路径选择模态框 -->
    <div id="path-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                    <h3><svg class="icon"><use href="#icon-folder"></use></svg> 选择知识库路径</h3>
                <button class="modal-close js-cancel-path">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="path-input">知识库路径</label>
                    <div class="input-group">
                        <input type="text" id="path-input" class="form-control" placeholder="请输入知识库的完整路径">
                        <button class="btn btn-secondary" id="browse-path-btn">
                            <svg class="icon"><use href="#icon-folder"></use></svg> 浏览
                        </button>
                    </div>
                    <div id="path-validation" class="validation-message"></div>
                </div>
                <div class="tips">
                    <h4><svg class="icon"><use href="#icon-lightbulb"></use></svg> 提示</h4>
                    <ul>
                        <li>路径必须是存在的文件夹</li>
                        <li>文件夹中应包含 Markdown 文件</li>
                        <li>确保有读取该路径的权限</li>
                    </ul>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary js-cancel-path">取消</button>
                <button class="btn btn-primary" id="confirm-path-btn" disabled>确认</button>
            </div>
        </div>
    </div>

    <!-- 生成选项模态框 -->
    <div id="generate-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                    <h3><svg class="icon"><use href="#icon-cog"></use></svg> 讲义生成选项</h3>
                <button class="modal-close js-cancel-generate">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>包含标签内容</label>
                    <div id="modal-tag-options" class="tag-options"></div>
                    <p class="form-hint">默认包含所有【...】标签内容</p>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="modal-include-toc" checked>
                        <span>生成目录</span>
                    </label>
                </div>
                <div class="form-group">
                    <label for="modal-format">输出格式</label>
                    <select id="modal-format" class="form-control">
                        <option value="html">HTML</option>
                        <option value="md">Markdown</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modal-filename">文件名（可选）</label>
                    <input type="text" id="modal-filename" class="form-control" placeholder="留空则自动生成">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary js-cancel-generate">取消</button>
                <button class="btn btn-primary" id="confirm-generate">生成</button>
            </div>
        </div>
    </div>

    <!-- 下载模态框 -->
    <div id="download-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                    <h3><svg class="icon"><use href="#icon-check"></use></svg> 讲义生成成功</h3>
                <button class="modal-close js-close-download">&times;</button>
            </div>
            <div class="modal-body">
                <div class="success-info">
                    <p><strong>文件名：</strong><span id="download-filename"></span></p>
                    <p><strong>包含：</strong><span id="download-filecount"></span></p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary js-close-download">关闭</button>
                <button class="btn btn-primary" id="download-btn">
                    <svg class="icon"><use href="#icon-download"></use></svg> 下载
                </button>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner">
            <svg class="icon icon-spin"><use href="#icon-spinner"></use></svg>
            <p id="loading-message">正在处理...</p>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="message-toast" class="toast"></div>

    <!-- 引入脚本 -->
    <script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/purify.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
