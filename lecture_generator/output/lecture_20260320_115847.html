    <style>
        body {
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;

            margin-bottom: 0.5em;

        h2 { border-bottom: 1px solid #ddd; padding-bottom: 5px; }

        ul, ol { padding-left: 2em; }
        code { background: #f5f5f5; padding: 2px 4px; border-radius: 3px; }
        pre { background: #f8f8f8; padding: 15px; border-radius: 5px; overflow: auto; }
        blockquote { border-left: 4px solid #3498db; margin: 1em 0; padding-left: 1em; color: #555; }

<body>
<h1 id="3">第3节 公民的基本权利和义务</h1>
<h1 id="_1">我国公民的基本义务</h1>
<ol>
<li>
<p>维护国家统一和各民族团结</p>
</li>
<li>
<p>遵守宪法和法律，保守国家秘密，爱护公共财产，遵守劳动纪律，遵守公共秩序，尊重社会公德。</p>
</li>
<li>
<p>维护祖国的安全、荣誉和利益。</p>
</li>
<li>
<p>保卫祖国、抵抗侵略是每个公民的神圣职责，依照法律服兵役和参加民兵组织是公民的光荣义务。</p>
</li>
<li>
<p>依法纳税。其他方面的基本义务。如劳动的义务、受教育的义务、夫妻双方实行计划生育的义务、父母抚养教育未成年子女的义务、成年子女赡养扶助父母的义务等。
【小记】
    权力和义务是相同的
【感悟】
    权力和义务是相同的</p>
</li>
</ol>
</body>
